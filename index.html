<!DOCTYPE html>
<html lang="or">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Odia AI Grammar Tutor</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#f2f7ff;
margin:0;
}

.app{
max-width:400px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px #ccc;
}

h2{
text-align:center;
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

textarea{
width:100%;
height:100px;
font-size:18px;
}


#answer{
background:#eef;
padding:15px;
border-radius:10px;
min-height:80px;
}

</style>

</head>


<body>


<div class="app">


<div class="card">

<h2>📚 Odia Grammar AI Tutor</h2>


<textarea id="question"
placeholder="ପ୍ରଶ୍ନ କୁହନ୍ତୁ..."></textarea>


<button onclick="startVoice()">
🎤 Speak Odia
</button>


<button onclick="askAI()">
Ask AI
</button>


<h3>AI Answer</h3>

<div id="answer">
ଏଠାରେ ଉତ୍ତର ଆସିବ...
</div>


<button onclick="speakAnswer()">
🔊 Listen
</button>


</div>


</div>



<script>


const webhookURL =
"YOUR_ACTIVEPIECES_URL";



let aiText="";


// Voice input

function startVoice(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;


if(!SpeechRecognition){

alert("Voice not supported");

return;
}


let recognition =
new SpeechRecognition();


recognition.lang="or-IN";


recognition.onresult=function(event){

document.getElementById("question").value =
event.results[0][0].transcript;

};


recognition.start();

}




async function askAI(){


let q =
document.getElementById("question").value;


if(!q){

alert("Question enter କରନ୍ତୁ");

return;

}


document.getElementById("answer").innerHTML =
"Thinking...";


let response =
await fetch(webhookURL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

question:q

})

});



let data =
await response.json();


aiText =
data.answer;



document.getElementById("answer")
.innerHTML=aiText;


}




function speakAnswer(){


let speech =
new SpeechSynthesisUtterance(aiText);


speech.lang="or-IN";


speechSynthesis.speak(speech);


}




// PWA

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}


</script>


</body>

</html>
